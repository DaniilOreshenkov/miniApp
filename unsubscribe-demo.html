<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beadly — Управление подпиской</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0e14; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; color: #f7f7fb; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .app { max-width: 420px; width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; padding: 16px 16px 0; height: 56px; border-bottom: 1px solid rgba(255,255,255,0.10); }
  .back { background: none; border: none; color: #f7f7fb; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 20px; }
  .title { flex: 1; text-align: center; font-size: 17px; font-weight: 700; }
  .spacer { width: 40px; }
  .content { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

  .hero { border-radius: 24px; background: linear-gradient(135deg, #6e4fd7 0%, #9b59d4 50%, #c77ddf 100%); padding: 32px 20px 28px; display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; overflow: hidden; }
  .hero-icon { width: 64px; height: 64px; border-radius: 20px; background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .hero-title { font-size: 26px; font-weight: 900; color: #fff; text-align: center; }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.80); font-weight: 500; }

  .plan-card { padding: 12px 16px; border-radius: 16px; border: 1px solid #7756df; background: rgba(119,86,223,0.12); display: flex; justify-content: space-between; align-items: center; }
  .plan-label { font-size: 12px; color: rgba(247,247,251,0.56); margin-bottom: 2px; }
  .plan-name { font-size: 16px; font-weight: 700; }

  .renewal-card { padding: 12px 14px; border-radius: 14px; background: rgba(52,199,89,0.08); border: 1px solid rgba(52,199,89,0.25); display: flex; align-items: center; justify-content: space-between; gap: 12; }
  .renewal-status { font-size: 13px; font-weight: 600; color: #34c759; }
  .renewal-date { font-size: 12px; color: rgba(247,247,251,0.56); margin-top: 2px; }
  .cancel-btn { background: none; border: 1px solid rgba(255,59,48,0.3); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: #ff3b30; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

  .confirm-card { padding: 12px 14px; border-radius: 14px; background: rgba(255,59,48,0.08); border: 1px solid rgba(255,59,48,0.25); display: flex; flex-direction: column; gap: 8px; }
  .confirm-title { font-size: 13px; font-weight: 600; }
  .confirm-desc { font-size: 12px; color: rgba(247,247,251,0.56); line-height: 1.4; }
  .confirm-btns { display: flex; gap: 8px; }
  .btn-no { flex: 1; height: 34px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.10); background: none; color: #f7f7fb; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-yes { flex: 1; height: 34px; border-radius: 9px; border: none; background: rgba(255,59,48,0.15); color: #ff3b30; font-size: 13px; font-weight: 700; cursor: pointer; }

  .cancelled { padding: 12px 14px; border-radius: 14px; background: rgba(255,59,48,0.08); border: 1px solid rgba(255,59,48,0.20); }
  .cancelled-status { font-size: 13px; font-weight: 600; color: #ff3b30; }
  .cancelled-desc { font-size: 12px; color: rgba(247,247,251,0.56); margin-top: 2px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back">‹</button>
    <div class="title">Подписка</div>
    <div class="spacer"></div>
  </div>
  <div class="content">

    <div class="hero">
      <div class="hero-icon">✦</div>
      <div>
        <div class="hero-title">Beadly Студия</div>
        <div class="hero-sub" style="text-align:center; margin-top:5px;">Полный доступ · Активна</div>
      </div>
    </div>

    <div class="plan-card">
      <div>
        <div class="plan-label">Текущий план</div>
        <div class="plan-name">Студия ✓</div>
      </div>
      <div style="font-size:13px; color:rgba(247,247,251,0.56);">349 ₽/мес</div>
    </div>

    <!-- Шаг 1: автопродление активно -->
    <div id="step1" class="renewal-card">
      <div>
        <div class="renewal-status">Автопродление включено</div>
        <div class="renewal-date">Следующее списание: 17 июля 2025</div>
      </div>
      <button class="cancel-btn" onclick="showConfirm()">Отменить</button>
    </div>

    <!-- Шаг 2: подтверждение отмены (скрыто) -->
    <div id="step2" class="confirm-card" style="display:none;">
      <div class="confirm-title">Отменить автопродление?</div>
      <div class="confirm-desc">Подписка останется активной до конца оплаченного периода.</div>
      <div class="confirm-btns">
        <button class="btn-no" onclick="hideConfirm()">Нет</button>
        <button class="btn-yes" onclick="showCancelled()">Да, отменить</button>
      </div>
    </div>

    <!-- Шаг 3: отменено (скрыто) -->
    <div id="step3" class="cancelled" style="display:none;">
      <div class="cancelled-status">Автопродление отключено</div>
      <div class="cancelled-desc">Карта отвязана. Подписка активна до 17 июля 2025.</div>
    </div>

  </div>
</div>
<script>
function showConfirm() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'flex';
}
function hideConfirm() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'flex';
}
function showCancelled() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
}
</script>
</body>
</html>
