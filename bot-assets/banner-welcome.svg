<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#0F0F0F"/>

  <!-- subtle grid decoration top-right -->
  <circle cx="980" cy="120" r="10" fill="#1E1E1E"/>
  <circle cx="1040" cy="120" r="10" fill="#1E1E1E"/>
  <circle cx="1100" cy="120" r="10" fill="#1E1E1E"/>
  <circle cx="1160" cy="120" r="10" fill="#1E1E1E"/>
  <circle cx="980" cy="180" r="10" fill="#1E1E1E"/>
  <circle cx="1040" cy="180" r="10" fill="#1E1E1E"/>
  <circle cx="1100" cy="180" r="10" fill="#FFFFFF" fill-opacity="0.15"/>
  <circle cx="1160" cy="180" r="10" fill="#1E1E1E"/>
  <circle cx="980" cy="240" r="10" fill="#1E1E1E"/>
  <circle cx="1040" cy="240" r="10" fill="#1E1E1E"/>
  <circle cx="1100" cy="240" r="10" fill="#1E1E1E"/>
  <circle cx="1160" cy="240" r="10" fill="#1E1E1E"/>

  <!-- decoration bottom-left -->
  <circle cx="120" cy="420" r="10" fill="#1E1E1E"/>
  <circle cx="180" cy="420" r="10" fill="#1E1E1E"/>
  <circle cx="240" cy="420" r="10" fill="#1E1E1E"/>
