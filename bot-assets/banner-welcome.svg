  <circle cx="180" cy="480" r="10" fill="#FFFFFF" fill-opacity="0.12"/>
  <circle cx="240" cy="480" r="10" fill="#1E1E1E"/>
  <circle cx="120" cy="540" r="10" fill="#1E1E1E"/>
  <circle cx="180" cy="540" r="10" fill="#1E1E1E"/>
  <circle cx="240" cy="540" r="10" fill="#1E1E1E"/>

  <!-- main text -->
  <text x="640" y="290" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-3" fill="#FFFFFF">beadly</text>
  <text x="640" y="370" text-anchor="middle" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#888888" letter-spacing="2">your personal assistant</text>

  <!-- thin accent line -->
