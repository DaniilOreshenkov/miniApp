const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

function svgToPng(asset) {
  return new Promise((resolve, reject) => {
    cvs.width = asset.w;
    cvs.height = asset.h;
    ctx.clearRect(0, 0, asset.w, asset.h);
    const blob = new Blob([asset.svg], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      try {
        ctx.drawImage(img, 0, 0, asset.w, asset.h);
        URL.revokeObjectURL(url);
        resolve(cvs.toDataURL('image/png'));
      } catch(e) { reject(e); }
    };
    img.onerror = reject;
    img.src = url;
  });
}

function b64toBlob(dataUrl) {
  const [header, data] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const bytes = atob(data);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function dlFile(dataUrl, name) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}
function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

async function downloadZip() {
  const btn = document.getElementById('btnZip');
  btn.disabled = true;
  btn.textContent = 'Генерирую...';
  setProgress(0);
  setStatus('Создаю PNG файлы...');

  try {
    const zip = new JSZip();
    for (let i = 0; i < ASSETS.length; i++) {
      const a = ASSETS[i];
      setStatus(`${a.label}...`);
      await new Promise(r => setTimeout(r, 60));
      const dataUrl = await svgToPng(a);
      zip.file(a.name, b64toBlob(dataUrl));
      setProgress(Math.round((i + 1) / ASSETS.length * 85));
    }
    setStatus('Упаковываю ZIP...');
    const content = await zip.generateAsync({ type: 'blob' });
    setProgress(100);
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'beadly-bot-assets.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus('✓ Готово — beadly-bot-assets.zip скачан');
  } catch(e) {
    setStatus('Ошибка: ' + e.message);
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '⬇ Скачать всё — ZIP архив';
}

async function buildCards() {
  const grid = document.getElementById('grid');
  for (const asset of ASSETS) {
    const card = document.createElement('div');
    card.className = 'card';
    const previewClass = asset.isAvatar ? 'preview avatar-wrap' : 'preview';
    card.innerHTML = `
      <p class="card-label">${asset.label}</p>
      <div class="${previewClass}" id="prev-${asset.id}"><div style="font-size:12px;color:#333;padding:20px">загрузка...</div></div>
      <button class="btn-dl" id="btn-${asset.id}">⬇ PNG</button>
      <p class="size-tag">${asset.size}</p>
    `;
    grid.appendChild(card);
    card.querySelector(`#btn-${asset.id}`).addEventListener('click', async () => {
      const btn = card.querySelector(`#btn-${asset.id}`);
      btn.disabled = true; btn.textContent = '...';
      try {
        const dataUrl = await svgToPng(asset);
        dlFile(dataUrl, asset.name);
      } catch(e) { alert('Ошибка: ' + e.message); }
      btn.disabled = false; btn.textContent = '⬇ PNG';
    });

    // render preview async
    setTimeout(async () => {
      try {
        const dataUrl = await svgToPng(asset);
        const img = document.createElement('img');
        img.src = dataUrl;
        const prev = card.querySelector(`#prev-${asset.id}`);
        prev.innerHTML = '';
        prev.appendChild(img);
      } catch(e) { console.warn('Preview error', e); }
    }, 0);
  }
}

document.getElementById('btnZip').addEventListener('click', downloadZip);
buildCards();
